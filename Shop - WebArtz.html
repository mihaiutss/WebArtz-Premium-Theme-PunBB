  /* Overlay backdrop */
#lightboxOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeIn 0.3s ease-out forwards;
}

/* Zoomed-in container */
.lightboxContent {
  position: relative;
  max-width: 80vw;
  max-height: 80vh;
  animation: scaleUp 0.3s ease-out forwards;
  transform-origin: center center;
}

#lightboxImg {
  max-width: 100%;
  max-height: 100%;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
  transition: transform 0.3s ease-out;
}

/* Close button */
#lightboxClose {
  position: absolute;
  top: -15px;
  right: -15px;
  background: #fff;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 20px;
  color: #333;
  cursor: pointer;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  transition: background 0.3s;
}
#lightboxClose:hover {
  background: #ddd;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes scaleUp {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
@keyframes scaleDown {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(0.5); opacity: 0; }
}

<script>
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('lightboxOverlay');
  const lightboxImg = document.getElementById('lightboxImg');
  const closeBtn = document.getElementById('lightboxClose');
  const lightboxContent = document.querySelector('.lightboxContent');

  // Open lightbox
  document.querySelectorAll('.shop-card a img').forEach(img => {
    img.parentElement.addEventListener('click', e => {
      e.preventDefault();
      const fullSize = img.parentElement.href;
      lightboxImg.src = fullSize;
      overlay.style.display = 'flex';
    });
  });

  // Close with button
  closeBtn.addEventListener('click', () => {
    closeLightbox();
  });

  // Close when clicking outside image
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeLightbox();
  });

  function closeLightbox() {
    // Animate zoom out
    lightboxContent.style.animation = 'scaleDown 0.25s ease-in forwards';
    overlay.style.animation = 'fadeIn 0.25s reverse';

    setTimeout(() => {
      overlay.style.display = 'none';
      lightboxContent.style.animation = 'scaleUp 0.3s ease-out forwards'; // reset for next open
      overlay.style.animation = 'fadeIn 0.3s ease-out forwards';
      lightboxImg.src = '';
    }, 200);
  }
});
</script>

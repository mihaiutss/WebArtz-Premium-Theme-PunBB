<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under Construction</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .countdown div {
      background: rgba(255, 255, 255, 0.1);
      padding: 1rem;
      border-radius: 10px;
      min-width: 70px;
    }

    .countdown div span {
      display: block;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .countdown div small {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .countdown div {
        min-width: 50px;
        padding: 0.8rem;
      }

      .countdown div span {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebArtz Forum is Under Construction</h1>
    <p>We're working hard to launch something amazing. Stay tuned!</p>
    <div class="countdown">
      <div><span id="days">--</span><small>Days</small></div>
      <div><span id="hours">--</span><small>Hours</small></div>
      <div><span id="minutes">--</span><small>Minutes</small></div>
      <div><span id="seconds">--</span><small>Seconds</small></div>
    </div>


    <div class="footer">© 2025 WebArtz Forum</div>
  </div>

<script>
  // Set a fixed launch date/time – 24h from a chosen start point
  const launchDate = new Date("2025-07-01T22:00:00").getTime(); // Example: June 29 at 22:00

  const updateCountdown = () => {
    const now = new Date().getTime();
    const distance = launchDate - now;

    if (distance <= 0) {
      document.querySelector(".countdown").innerHTML = "<strong>We're live now!</strong>";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
  };

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>


</body>
</html>
